[package]
edition = "2024"
name = "tests-grapefruit"
version = "0.1.0"

[features]
h753 = ["stm32h7/stm32h753"]

[dependencies]
cfg-if = { workspace = true }
cortex-m = { workspace = true }
cortex-m-rt = { workspace = true }
stm32h7 = { workspace = true, features = ["rt"] }

kern = { path = "../../sys/kern" }

[build-dependencies]
