name = "demo-stm32h753-nucleo"
target = "thumbv7em-none-eabihf"
board = "nucleo-h753zi"
chip = "../../chips/stm32h7"
memory = "memory-large.toml"
stacksize = 896

[kernel]
name = "demo-stm32h7-nucleo"
requires = {flash = 24736, ram = 5120}
features = ["h753", "dump"]

[caboose]
tasks = ["control_plane_agent"]
region = "flash"
size = 256

[tasks.jefe]
name = "task-jefe"
priority = 0
start = true
features = ["dump"]
stacksize = 2000
notifications = ["fault", "timer"]
extern-regions = [ "sram1", "sram2", "sram3", "sram4" ]

[tasks.jefe.config.allowed-callers]
set_reset_reason = ["sys"]
request_reset = ["hiffy", "control_plane_agent"]

[tasks.sys]
name = "drv-stm32xx-sys"
features = ["h753", "exti", "no-panic"]
priority = 1
uses = ["rcc", "gpios", "system_flash", "syscfg", "exti"]
start = true
task-slots = ["jefe"]
notifications = ["exti-wildcard-irq"]

[tasks.sys.interrupts]
"exti.exti0" = "exti-wildcard-irq"
"exti.exti1" = "exti-wildcard-irq"
"exti.exti2" = "exti-wildcard-irq"
"exti.exti3" = "exti-wildcard-irq"
"exti.exti4" = "exti-wildcard-irq"
"exti.exti9_5" = "exti-wildcard-irq"
"exti.exti15_10" = "exti-wildcard-irq"

[tasks.sys.config.gpio-irqs.button]
port = "C"
pin = 13
owner = {name = "user_button", notification = "button"}

[tasks.sys.config.gpio-irqs.rot_irq]
port = "D"
pin = 0
owner = {name = "sprot", notification = "rot_irq"}

[tasks.i2c_driver]
name = "drv-stm32xx-i2c-server"
stacksize = 1048
features = ["h753"]
priority = 2
uses = ["i2c1", "i2c2", "i2c3", "i2c4"]
notifications = ["i2c1-irq", "i2c2-irq", "i2c3-irq", "i2c4-irq"]
start = true
task-slots = ["sys"]

[tasks.i2c_driver.interrupts]
"i2c1.event" = "i2c1-irq"
"i2c1.error" = "i2c1-irq"
"i2c2.event" = "i2c2-irq"
"i2c2.error" = "i2c2-irq"
"i2c3.event" = "i2c3-irq"
"i2c3.error" = "i2c3-irq"
"i2c4.event" = "i2c4-irq"
"i2c4.error" = "i2c4-irq"

[tasks.packrat]
name = "task-packrat"
priority = 2
start = true
# task-slots is explicitly empty: packrat should not send IPCs!
task-slots = []

[tasks.spi_driver]
name = "drv-stm32h7-spi-server"
priority = 2
features = ["spi1", "h753"]
uses = ["spi1"]
start = true
notifications = ["spi-irq"]
interrupts = {"spi1.irq" = "spi-irq"}
stacksize = 880
task-slots = ["sys"]

[tasks.net]
name = "task-net"
stacksize = 4000
priority = 2
max-sizes = {flash = 131072, ram = 32768, sram1_mac = 32768}
features = ["h753"]
sections = {eth_bulk = "sram1_mac"}
uses = ["eth", "tim16"]
start = true
notifications = ["eth-irq", "mdio-timer-irq", "wake-timer"]
interrupts = {"eth.irq" = "eth-irq", "tim16.irq" = "mdio-timer-irq"}
task-slots = ["sys", "jefe"]

[tasks.user_leds]
name = "drv-user-leds"
features = ["stm32h7"]
priority = 2
start = true
task-slots = ["sys"]
notifications = ["timer"]
config = { blink_at_start = [ "Led::Zero" ] }

[tasks.user_button]
name = "task-nucleo-user-button"
priority = 3
start = true
task-slots = ["sys", "user_leds"]
notifications = ["button"]
config = { led = 1, edge = "Edge::Rising" }

[tasks.udpecho]
name = "task-udpecho"
priority = 3
stacksize = 4096
start = true
task-slots = ["net"]
notifications = ["socket"]

[tasks.udpbroadcast]
name = "task-udpbroadcast"
priority = 3
stacksize = 4096
start = true
task-slots = ["net", "packrat"]
notifications = ["socket"]

[tasks.udprpc]
name = "task-udprpc"
priority = 3
stacksize = 4096
start = true
task-slots = ["net"]
notifications = ["socket"]

[tasks.hiffy]
name = "task-hiffy"
features = ["h753", "stm32h7", "i2c", "gpio", "spi", "qspi", "hash", "turbo"]
priority = 5
stacksize = 2048
start = true
task-slots = ["sys", "i2c_driver", "hf", "hash_driver"]

[tasks.hf]
name = "drv-mock-gimlet-hf-server"
features = ["h753", "hash"]
priority = 4
stacksize = 2048
start = true
uses = ["quadspi"]
notifications = ["qspi-irq"]
interrupts = {"quadspi.irq" = "qspi-irq"}
task-slots = ["sys", "hash_driver"]

[tasks.hash_driver]
name = "drv-stm32h7-hash-server"
features = ["h753"]
priority = 3
stacksize = 2048
start = true
uses = ["hash"]
notifications = ["hash-irq"]
interrupts = {"hash.irq" = "hash-irq"}
task-slots = ["sys"]

[tasks.gimlet_seq]
name = "drv-mock-gimlet-seq-server"
priority = 2
start = true
task-slots = ["jefe"]

[tasks.update_server]
name = "stm32h7-update-server"
priority = 3
stacksize = 2048
start = true
uses = ["flash_controller"]
extern-regions = ["bank2"]
notifications = ["flash-irq"]
interrupts = {"flash_controller.irq" = "flash-irq"}

[tasks.validate]
name = "task-validate"
priority = 3
stacksize = 1024
start = true
task-slots = ["i2c_driver"]

[tasks.sensor]
name = "task-sensor"
priority = 5
stacksize = 1024
start = true

[tasks.sprot]
name = "drv-stm32h7-sprot-server"
priority = 5
stacksize = 16384
start = true
task-slots = ["sys"]
features = ["sink_test", "use-spi-core", "h753", "spi3"]
uses = ["spi3"]
notifications = ["spi-irq", "rot-irq", "timer"]
interrupts = {"spi3.irq" = "spi-irq"}

[tasks.control_plane_agent]
name = "task-control-plane-agent"
priority = 7
stacksize = 6256
start = true
uses = ["usart1"]
task-slots = [
    "jefe",
    "net",
    "dump_agent",
    "update_server",
    "sys",
    "hf",
    { cpu_seq = "gimlet_seq" },
    "validate",
    "sensor",
    "sprot",
    "packrat",
    "user_leds",
]
features = ["gimlet", "usart1-gimletlet", "baud_rate_3M"]
notifications = ["usart-irq", "socket", "timer"]
interrupts = {"usart1.irq" = "usart-irq"}

[tasks.idle]
name = "task-idle"
priority = 9
stacksize = 256
start = true

[tasks.rng_driver]
features = ["h753"]
priority = 3
name = "drv-stm32h7-rng"
stacksize = 512
start = true
task-slots = ["sys", "user_leds"]
uses = ["rng"]

[tasks.dump_agent]
name = "task-dump-agent"
features = ["no-rot"]
priority = 4
start = true
task-slots = ["jefe"]
stacksize = 1200
extern-regions = [ "sram1", "sram2", "sram3", "sram4" ]

[config]
[[config.i2c.controllers]]
controller = 2

[config.i2c.controllers.ports.F]
scl.pin = 1
sda.pin = 0
af = 4

#
# To use the Nucleo board as an SPD initiator, uncomment the following:
#
# [[config.i2c.controllers.ports.F.muxes]]
# driver = "ltc4306"
# address = 0b1001_010

[config.spi.spi1]
controller = 1

[config.spi.spi1.mux_options.cn7_arduino]
outputs = [
    {port = "A", pins = [3], af = 5},
    {port = "B", pins = [5], af = 5},
]
input = {port = "A", pin = 6, af = 5}

[config.spi.spi1.devices.pins]
mux = "cn7_arduino"
cs = [{port = "D", pin = 14}]
clock_divider = "DIV32"

[config.spi.spi3]
controller = 3

[config.spi.spi3.mux_options.port_c]
outputs = [
    {port = "C", pins = [10, 12], af = 6},
]
input = {port = "C", pin = 11, af = 6}

[config.spi.spi3.devices.spi3_header]
mux = "port_c"
cs = [{port = "A", pin = 15}]
clock_divider = "DIV256"

[config.net]
# UDP ports in sockets below are assigned in oxidecomputer/oana

[config.net.sockets.echo]
kind = "udp"
owner = {name = "udpecho", notification = "socket"}
port = 7
tx = { packets = 3, bytes = 1024 }
rx = { packets = 3, bytes = 1024 }

[config.net.sockets.broadcast]
kind = "udp"
owner = {name = "udpbroadcast", notification = "socket"}
port = 997
tx = { packets = 3, bytes = 1024 }
rx = { packets = 3, bytes = 1024 }

[config.net.sockets.rpc]
kind = "udp"
owner = {name = "udprpc", notification = "socket"}
port = 998
tx = { packets = 3, bytes = 1024 }
rx = { packets = 3, bytes = 1024 }

[config.net.sockets.control_plane_agent]
kind = "udp"
owner = {name = "control_plane_agent", notification = "socket"}
port = 11111
tx = { packets = 3, bytes = 2048 }
rx = { packets = 3, bytes = 2048 }
