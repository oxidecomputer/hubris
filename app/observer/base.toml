name = "psu2mcu"
address = 0b1011_010
device = "mwocp68"
description = "PSU 2 MCU"
power = { rails = [ "V54_PSU2", "V12_PSU2" ], sensors = ["voltage", "current", "input-voltage", "input-current"] }
sensors = { input-voltage = 2, input-current = 2, voltage = 2, current = 2, temperature = 3, speed = 2 }
refdes = "PSU2"

[[config.i2c.devices]]
